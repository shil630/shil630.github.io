<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#1E1D1B" flood-opacity="0.06"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#B64B3B"/>
    </marker>
  </defs>

  <rect width="1200" height="900" fill="#F5F1EA"/>

  <text x="72" y="72" fill="#1E1D1B" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="34" font-weight="700">仓位超限后，分批削峰</text>
  <text x="72" y="112" fill="#6F6B66" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="19">不是预测顶部，而是把仓位拉回系统允许的范围</text>

  <rect x="72" y="148" width="1056" height="292" rx="22" fill="#FBF9F5" filter="url(#shadow)"/>
  <text x="104" y="190" fill="#1E1D1B" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="20" font-weight="650">价格路径</text>
  <text x="1010" y="190" fill="#8D8881" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="15" text-anchor="end">仅为示意</text>
  <line x1="118" y1="400" x2="1080" y2="400" stroke="#D9CFC3" stroke-width="1.5"/>
  <path d="M128 382 C185 369 204 378 254 348 C310 316 343 340 396 304 C452 268 486 294 542 255 C597 216 630 241 680 210 C735 175 773 217 824 179 C875 141 910 182 961 150 C1003 126 1035 145 1070 120"
        transform="translate(0 72)" fill="none" stroke="#1E1D1B" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <g font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-weight="700" font-size="14" text-anchor="middle">
    <circle cx="680" cy="282" r="20" fill="#B64B3B"/>
    <text x="680" y="287" fill="#FFFFFF">S1</text>
    <circle cx="824" cy="251" r="20" fill="#B64B3B"/>
    <text x="824" y="256" fill="#FFFFFF">S2</text>
    <circle cx="961" cy="222" r="20" fill="#B64B3B"/>
    <text x="961" y="227" fill="#FFFFFF">S3</text>
  </g>

  <text x="546" y="420" fill="#6F6B66" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="16" text-anchor="end">长期逻辑仍在</text>
  <path d="M566 412 C598 408 618 385 651 324" fill="none" stroke="#8D8881" stroke-width="1.8"/>
  <text x="846" y="420" fill="#B64B3B" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="16" font-weight="650">上涨让仓位被动超限</text>

  <rect x="72" y="474" width="1056" height="304" rx="22" fill="#FBF9F5" filter="url(#shadow)"/>
  <text x="104" y="516" fill="#1E1D1B" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="20" font-weight="650">仓位占比</text>
  <text x="1010" y="516" fill="#8D8881" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="15" text-anchor="end">仅为示意</text>

  <rect x="118" y="660" width="892" height="72" rx="12" fill="#E8DED3" opacity="0.9"/>
  <text x="1030" y="701" fill="#6F6B66" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="16">目标区间</text>
  <line x1="118" y1="610" x2="1010" y2="610" stroke="#B64B3B" stroke-width="2" stroke-dasharray="10 9"/>
  <text x="1030" y="616" fill="#B64B3B" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="16">硬上限</text>

  <path d="M128 710 C230 706 305 680 388 655 C474 629 558 615 630 576 L646 576 L646 672 C692 654 741 628 794 586 L810 586 L810 680 C856 664 903 640 951 596 L968 596 L968 692 C1005 688 1039 681 1070 668"
        fill="none" stroke="#1E1D1B" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <g font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="14" font-weight="700" text-anchor="middle">
    <circle cx="638" cy="576" r="20" fill="#B64B3B"/>
    <text x="638" y="581" fill="#FFFFFF">S1</text>
    <circle cx="802" cy="586" r="20" fill="#B64B3B"/>
    <text x="802" y="591" fill="#FFFFFF">S2</text>
    <circle cx="959" cy="596" r="20" fill="#B64B3B"/>
    <text x="959" y="601" fill="#FFFFFF">S3</text>
  </g>

  <path d="M638 630 L638 653" stroke="#B64B3B" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M802 630 L802 661" stroke="#B64B3B" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M959 630 L959 670" stroke="#B64B3B" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="468" y="758" fill="#6F6B66" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="16" text-anchor="end">进入超限区</text>
  <text x="520" y="758" fill="#B64B3B" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="16" font-weight="650">分批卖出</text>
  <text x="617" y="758" fill="#6F6B66" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="16">→ 回到目标区间</text>

  <line x1="72" y1="824" x2="1128" y2="824" stroke="#D9CFC3" stroke-width="1.5"/>
  <text x="72" y="858" fill="#8D8881" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="15">匿名示意图｜不代表真实价格、收益或交易建议</text>
  <text x="1128" y="858" fill="#B64B3B" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="15" font-weight="650" text-anchor="end">纪律不是看空，是控制尺度</text>
</svg>
