works:
  - slug: "site-manager"
    title: "UniFi Site Manager"
    subtitle_zh: "全域 IT 站点管理系统"
    subtitle_en: "All-in-one multi-site IT management"
    description_zh: "统一管理分散在不同地点的站点、应用与设备，让复杂的多站点 IT 运维变得清晰、直观且可扩展。"
    description_en: "Bringing distributed sites, applications and devices into one clear, intuitive and scalable administration experience."
    challenge_zh: "如何精简多站点 IT 运维流程，同时兼顾不同规模用户的效率与学习成本？"
    challenge_en: "How might we streamline multi-site IT administration while supporting users at very different levels of scale and expertise?"
    image: "/assets/images/work/unifi-site-manager.png"
    alt: "UniFi Site Manager desktop and mobile interfaces"
    media: "flush"
    tags:
      - "UX Strategy"
      - "Enterprise"
      - "Cross-platform"

  - slug: "console-setup"
    title: "UniFi OS Console Setup"
    subtitle_zh: "企业级网关主机安装配置体验"
    subtitle_en: "Enterprise console setup experience"
    description_zh: "重新梳理软硬件结合的首次配置流程，让 IT 经验有限的用户也能理解每一步并顺利完成部署。"
    description_en: "Reshaping a hardware-and-software setup journey so users with limited IT expertise can understand each step and deploy with confidence."
    challenge_zh: "如何把专业网络设备的复杂配置，转化为简单、可信且不失控制感的引导体验？"
    challenge_en: "How might we turn complex network configuration into a guided experience that feels simple, trustworthy and still in the user's control?"
    image: "/assets/images/work/unifi-console-setup.png"
    alt: "UniFi OS Console setup across hardware, desktop and mobile"
    media: "flush"
    tags:
      - "Onboarding"
      - "End-to-end Flow"
      - "Hardware + Software"

  - slug: "protect-redesign"
    title: "UniFi Protect Redesign"
    subtitle_zh: "智能物理安防管理系统再设计"
    subtitle_en: "Physical security management redesign"
    description_zh: "面向大规模摄像头部署，重构安防事件的查看、追溯与响应体验，在高信息密度下保持清晰与效率。"
    description_en: "Redesigning how security events are monitored, reviewed and handled across large camera deployments without losing clarity at scale."
    challenge_zh: "如何在摄像头数量和事件规模持续增长时，仍让用户快速发现重点并采取行动？"
    challenge_en: "How might we help users find what matters and act quickly as camera fleets and security events continue to scale?"
    image: "/assets/images/work/unifi-protect-redesign.png"
    alt: "UniFi Protect security camera management on desktop and mobile"
    media: "flush"
    tags:
      - "Information Architecture"
      - "Physical Security"
      - "Responsive UX"

capabilities:
  - title_zh: "设计系统"
    title_en: "Design System"
    description_zh: "从基础规范、组件与 Pattern 到数据可视化，推动跨产品的一致性与设计研发协同。"
    description_en: "Evolving foundations, components, patterns and data visualization to improve consistency and design-engineering collaboration across products."
    image: "/assets/images/work/unifi-design-system.png"
    alt: "Overview of the UniFi Design System"

  - title_zh: "设计领导力"
    title_en: "Design Leadership"
    description_zh: "通过设计原则、工作坊和跨产品协作机制，把团队经验沉淀为可复用的决策方法。"
    description_en: "Turning team knowledge into repeatable decision-making practices through design principles, workshops and cross-product collaboration."
    image: "/assets/images/work/design-leadership.png"
    alt: "Design workshops and cross-product collaboration"
