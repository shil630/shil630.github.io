<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang }}">
{% include head.html %}
<body data-content-slug="{% if page.layout == 'post' %}{{ page.slug | escape }}{% elsif page.url == '/' %}home{% else %}{{ page.url | remove_first: '/' | split: '/' | first | default: 'page' | escape }}{% endif %}">
  {% include header.html %}

  <main class="site-main">
    {{ content }}
  </main>

  {% include footer.html %}

  <script src="{{ '/assets/js/analytics.js' | relative_url }}?v={{ site.time | date: '%s' }}"></script>
  <script src="{{ '/assets/js/main.js' | relative_url }}?v={{ site.time | date: '%s' }}"></script>
</body>
</html>
