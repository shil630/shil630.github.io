<header class="site-header">
  <div class="wrap header-inner">
    <a class="site-title" href="{{ '/' | relative_url }}">石亮正EV</a>

    <nav class="site-nav">
      <a href="{{ '/' | relative_url }}"{% if page.url == '/' %} class="active"{% endif %}>
        <span data-en="Home" data-zh="首页">首页</span>
      </a>
      <a href="{{ '/work/' | relative_url }}"{% if page.url contains 'work' %} class="active"{% endif %}>
        <span data-en="Work" data-zh="作品">作品</span>
      </a>
      <a href="{{ '/archive/' | relative_url }}"{% if page.url contains 'archive' %} class="active"{% endif %}>
        <span data-en="Articles" data-zh="文章">文章</span>
      </a>
      <a href="{{ '/tools/' | relative_url }}"{% if page.url contains 'tools' %} class="active"{% endif %}>
        <span data-en="Tools" data-zh="工具">工具</span>
      </a>
      <a href="{{ '/about/' | relative_url }}"{% if page.url contains 'about' %} class="active"{% endif %}>
        <span data-en="About" data-zh="关于">关于</span>
      </a>
      <button id="lang-toggle" class="lang-toggle" type="button" aria-label="切换语言 / Switch language">中 / EN</button>
    </nav>
  </div>
</header>
