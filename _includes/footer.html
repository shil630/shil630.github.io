<footer class="site-footer">
  <div class="wrap footer-inner">
    <div class="social">
      <a href="{{ '/work/' | relative_url }}"><span data-en="Work" data-zh="作品">作品</span></a>
      <a href="{{ '/archive/' | relative_url }}"><span data-en="All articles" data-zh="全部文章">全部文章</span></a>
      {% if site.social.github %}<a href="https://github.com/{{ site.social.github }}" target="_blank" rel="noopener">GitHub</a>{% endif %}
      {% if site.social.linkedin %}<a href="{{ site.social.linkedin }}" target="_blank" rel="noopener">LinkedIn</a>{% endif %}
      {% if site.social.instagram %}<a href="https://www.instagram.com/{{ site.social.instagram }}" target="_blank" rel="noopener">Instagram</a>{% endif %}
      {% if site.social.twitter %}<a href="https://twitter.com/{{ site.social.twitter }}" target="_blank" rel="noopener">Twitter</a>{% endif %}
    </div>
    <p class="copyright">© {{ site.time | date: '%Y' }} {{ site.author }} · <span data-en="A Positive EV experiment" data-zh="一场持续进行的正EV实验">一场持续进行的正EV实验</span></p>
  </div>
</footer>
