# --- Site settings ---
title: "石亮正EV"
tagline: "在不确定中，持续做更好的决策"
description: "石亮正EV：一个 UX 设计师关于设计、投资、德州与不确定性决策的长期实验，记录期望值、投入尺度、退出纪律和真实复盘。"
author: "石亮 / Liang Shi"
email: "shiliangbj12@gmail.com"
lang: "zh"
timezone: "America/New_York"

# baseurl "" 因为这是 user page (shil630.github.io)，站点位于域名根目录
baseurl: ""
url: "https://shil630.github.io"

# --- Social links (留空即不显示) ---
social:
  github: "shil630"
  instagram: "shiliangbj12"
  twitter: "shiliangbj12"
  linkedin: "https://www.linkedin.com/in/liang-shi-105172128/"

# --- Analytics & 邮件订阅 (填好 ID 后自动生效，留空则不渲染) ---
# GA4 衡量 ID，形如 G-XXXXXXXXXX (analytics.google.com 注册后获取)
google_analytics: "G-MQH963M94G"
# Buttondown 用户名 (buttondown.com 注册后获取)
buttondown_username: "shiliangbj12"

# --- SEO / 社交分享卡片 ---
twitter:
  username: "shiliangbj12"
  card: "summary"
logo: "/assets/images/avatar-blog-512.png"
# 站点级默认分享图，可换成自己设计的 og 卡片 (建议 1200x630)
og_image: "/assets/images/blog-home-og.png"

# --- Build settings ---
markdown: kramdown
highlighter: rouge
permalink: /posts/:year/:month/:day/:title/
paginate: 8
paginate_path: "/page/:num/"

kramdown:
  input: GFM
  syntax_highlighter: rouge

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-paginate
  - jekyll-sitemap

# 把 _pages 里的页面纳入构建
include:
  - _pages

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      lang: "zh"
      image: "/assets/images/blog-home-og.png"

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE
  - vendor
  - setup
  - check
  - preview
  - "AI 博客写作与运营解决方案 商业计划.md"
