# --- Site settings ---
title: "Liang Shi"
tagline: "设计 · 投资 · 德州扑克"
description: "Liang Shi 的个人博客 — 记录设计、投资与德州扑克。Personal blog of Liang Shi on design, investing and poker."
author: "Liang Shi"
email: "shiliangbj12@gmail.com"
lang: "zh"
timezone: "America/New_York"

# baseurl "" 因为这是 user page (shil630.github.io)，站点位于域名根目录
baseurl: ""
url: "https://shil630.github.io"

# --- Social links (留空即不显示) ---
social:
  github: "shil630"
  instagram: "shiliangbj12"
  twitter: "shiliangbj12"
  linkedin: "https://www.linkedin.com/in/liang-shi-105172128/"

# --- Analytics & 邮件订阅 (填好 ID 后自动生效，留空则不渲染) ---
# GA4 衡量 ID，形如 G-XXXXXXXXXX (analytics.google.com 注册后获取)
google_analytics: ""
# Buttondown 用户名 (buttondown.com 注册后获取)
buttondown_username: ""

# --- SEO / 社交分享卡片 ---
twitter:
  username: "shiliangbj12"
  card: "summary"
logo: "/assets/images/photo.jpg"
# 站点级默认分享图，可换成自己设计的 og 卡片 (建议 1200x630)
og_image: "/assets/images/photo.jpg"

# --- Build settings ---
markdown: kramdown
highlighter: rouge
permalink: /posts/:year/:month/:day/:title/
paginate: 8
paginate_path: "/page/:num/"

kramdown:
  input: GFM
  syntax_highlighter: rouge

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-paginate

# 把 _pages 里的页面纳入构建
include:
  - _pages

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      lang: "zh"
      image: "/assets/images/photo.jpg"

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE
  - vendor
